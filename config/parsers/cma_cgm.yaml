# CMA CGM Cargo Manifest parser configuration
# Format: "CARGO MANIFEST" generated by PFP077B_CMA v5.x
name: CMA CGM Manifest
shipowner: CMA CGM

# X-column boundaries (PDF points, landscape A4 = 842 wide)
col_left_max: 200       # x < this → left address column (BL#, SH, CN, N, FE)
col_mid_min: 245        # x > this → cargo/container detail column

# Y below which data starts (skip page header band)
data_y_min: 100

# BL record trigger: single token at this X range matching the pattern
bl_number_x_min: 60
bl_number_x_max: 95
bl_number_pattern: "^[A-Z]{2,5}[0-9]{4,}"

# Waybill marker (appears on same line as BL number for sea waybills)
waybill_marker: "WAYBILL"

# Section labels — always at x≈68, followed by content at x≈82+
section_shipper: "SH:"
section_consignee: "CN:"
section_notify: "N:"
section_freight_forwarder: "FE:"

# SPLIT (container) line keywords
split_marker: "SPLIT"
pack_label: "PACK:"
inpack_label: "IN-PACK:"
weight_label: "WGT:"
volume_label: "VOL:"

# Container detail keywords
ctr_label: "CTR:"
seal1_label: "SEAL1:"
seal2_label: "SEAL2:"
seal3_label: "SEAL3:"
sztp_label: "SZTP:"       # container size/type (e.g. 40HC, 20DV)
tare_label: "TARE:"

# BL record end marker
bl_total_marker: "B/L TOTAL"

# Page header keywords
voyage_label: "VOYAGE:"
vessel_label: "VESSEL:"
arrival_label: "DATE OF ARRIVAL"

# ============================================================
# Per-page header fields — extracted via SpatialPage label-anchored lookup
# Applied to every page; values copied into BLs that start on that page.
# ============================================================
page_header_fields:
  vessel:
    regex: "VESSEL:\\s*(.+?)\\s*FLAG:"
  voyage:
    regex: "VOYAGE:\\s*(\\S+)"
  date_of_arrival:
    label_anchor: "ARRIVAL"
    direction: "below"
    max_distance: 25
    x_tolerance: 50
    max_words: 1
  port_of_loading:
    label_anchor: "Loading"
    direction: "right"
    max_distance: 200
    y_tolerance: 4
    max_words: 4
    stop_at: "B/L"
  port_of_discharge:
    label_anchor: "Discharge"
    direction: "right"
    max_distance: 200
    y_tolerance: 4
    max_words: 4
    stop_at: "B/L"
  place_of_delivery:
    label_anchor: "delivery"
    direction: "right"
    max_distance: 200
    y_tolerance: 4
    max_words: 4
    stop_at: "B/L"
  place_of_acceptance:
    label_anchor: "Acceptance"
    direction: "right"
    max_distance: 250
    y_tolerance: 4
    max_words: 4
    stop_at: "B/L"

