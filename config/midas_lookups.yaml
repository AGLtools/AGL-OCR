# Mode d'expédition (FCL = Full Container Load, LCL = Less than Container Load)
movement_to_mode:
  "fcl/fcl": "FCLFCL"
  "fcl-fcl": "FCLFCL"
  "fcl":     "FCLFCL"
  "lcl/lcl": "LCLLCL"
  "lcl-lcl": "LCLLCL"
  "lcl":     "LCLLCL"
  "fcl/lcl": "FCLLCL"
  "lcl/fcl": "LCLFCL"

