  "fcl/fcl": "FCLFCL"
  "fcl-fcl": "FCLFCL"
  "fcl":     "FCLFCL"
  "lcl/lcl": "LCLLCL"
  "lcl-lcl": "LCLLCL"
  "lcl":     "LCLLCL"
  "fcl/lcl": "FCLLCL"
  "lcl/fcl": "LCLFCL"

# Mois en français
