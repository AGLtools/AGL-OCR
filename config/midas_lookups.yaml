# Valeurs statiques par défaut
defaults:
  systeme: "MIDAS"
  qualifie: "Oui"
  i_imp_e_exp: "I"        # Import par défaut (à override si export détecté)
  code_mode_expedition: "FCLFCL"
  port_escale: "ABIDJAN"  # Port AGL principal
  consignataire: "OMA CI" # Code consignataire AGL par défaut
