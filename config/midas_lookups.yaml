# MIDAS lookups — extensible. Add entries here without touching code.
# All keys are case-insensitive (matched in lowercase).

# Préfixe du numéro BL → code armateur (4 lettres = code SCAC)
bl_prefix_to_carrier:
  hlcu: { code: "HLCU", name: "HAPAG LLOYD" }
  hlxu: { code: "HLCU", name: "HAPAG LLOYD" }
  maeu: { code: "MAEU", name: "MAERSK" }
  mskl: { code: "MAEU", name: "MAERSK" }
  sudu: { code: "SUDU", name: "HAMBURG SUD" }
  safm: { code: "SAFM", name: "SAFMARINE" }
  mscu: { code: "MSCU", name: "MSC" }
  medu: { code: "MSCU", name: "MSC" }
  cma:  { code: "CMAU", name: "CMA CGM" }
  cmau: { code: "CMAU", name: "CMA CGM" }
  apll: { code: "APLU", name: "APL" }
  aplu: { code: "APLU", name: "APL" }
  cosu: { code: "COSU", name: "COSCO" }
  oolu: { code: "OOLU", name: "OOCL" }
  ymlu: { code: "YMLU", name: "YANG MING" }
  evrg: { code: "EVRG", name: "EVERGREEN" }
  egls: { code: "EGLS", name: "EVERGREEN" }
  one:  { code: "ONEY", name: "ONE" }
  oney: { code: "ONEY", name: "ONE" }
  zimu: { code: "ZIMU", name: "ZIM" }
  pcil: { code: "PCIL", name: "PIL" }
  pabv: { code: "PABV", name: "PIL" }
  whlc: { code: "WHLC", name: "WAN HAI" }
  hdmu: { code: "HDMU", name: "HMM" }

# Type conteneur (depuis manifeste) → CODE_CONDIT MIDAS + nb TEU
# Format SCAC ISO 6346 : XXY où XX=taille, Y=type (G=general, R=reefer, T=tank, U=open top, V=ventilated, P=platform)
container_type_to_midas:
  "40hc": { code_condit: "40H", teu: 2 }
  "40hq": { code_condit: "40H", teu: 2 }
  "40dr": { code_condit: "40S", teu: 2 }
  "40gp": { code_condit: "40S", teu: 2 }
  "40rh": { code_condit: "40R", teu: 2 }
  "40rf": { code_condit: "40R", teu: 2 }
  "40ot": { code_condit: "40U", teu: 2 }
  "40fr": { code_condit: "40P", teu: 2 }
  "40tk": { code_condit: "40T", teu: 2 }
  "20gp": { code_condit: "20S", teu: 1 }
  "20dr": { code_condit: "20S", teu: 1 }
  "20rf": { code_condit: "20R", teu: 1 }
  "20rh": { code_condit: "20R", teu: 1 }
  "20ot": { code_condit: "20U", teu: 1 }
  "20fr": { code_condit: "20P", teu: 1 }
  "20tk": { code_condit: "20T", teu: 1 }
  "45hc": { code_condit: "45H", teu: 2 }

